version: 2

before:
  hooks:
    - go fmt ./...
    - go vet -tags sqlite_fts5 ./...

builds:
  - id: mnemonic
    main: ./cmd/mnemonic
    binary: mnemonic
    env:
      - CGO_ENABLED=1
    tags:
      - sqlite_fts5
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - config.example.yaml
      - docs/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"

release:
  github:
    owner: appsprout-dev
    name: mnemonic
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: appsprout-dev
      name: homebrew-tap
    name: mnemonic
    homepage: "https://github.com/appsprout-dev/mnemonic"
    description: "Local-first semantic memory system with cognitive agents"
    license: "AGPL-3.0"
    install: |
      bin.install "mnemonic"
    test: |
      system "#{bin}/mnemonic", "version"
